<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Documents — HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-gray-50">
<div class="flex h-full">
    {% include "components/sidebar.html" %}
    <main class="flex-1 overflow-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Clinical Documents</h1>
                    <p class="text-gray-500 mt-1">Upload and manage clinical documents, reports, and scans</p>
                </div>
                <button onclick="document.getElementById('uploadModal').classList.remove('hidden')"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + Upload Document
                </button>
            </div>

            <!-- Filter -->
            <div class="bg-white rounded-lg shadow mb-6 p-4">
                <div class="flex gap-4 items-center">
                    <input type="text" id="filterPatient" placeholder="Patient ID..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <input type="text" id="filterVisit" placeholder="Visit ID (optional)..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <button onclick="loadDocs()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">Search</button>
                </div>
            </div>

            <!-- Documents Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Uploaded</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Size</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="docsTable">
                        <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Enter a patient ID to view documents</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Upload Modal -->
<div id="uploadModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
        <h2 class="text-lg font-bold mb-4">Upload Document</h2>
        <form id="uploadForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Patient ID</label>
                    <input type="text" name="patient_id" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Visit ID (optional)</label>
                    <input type="text" name="visit_id" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Title</label>
                <input type="text" name="title" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Lab Report - CBC">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Document Type</label>
                    <select name="document_type" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="lab_report">Lab Report</option>
                        <option value="imaging_report">Imaging Report</option>
                        <option value="consultation">Consultation</option>
                        <option value="referral">Referral</option>
                        <option value="discharge_summary">Discharge Summary</option>
                        <option value="consent_form">Consent Form</option>
                        <option value="insurance">Insurance</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">File</label>
                    <input type="file" name="file" id="docFile" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" rows="2" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Optional description..."></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button" onclick="document.getElementById('uploadModal').classList.add('hidden')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Upload</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadDocs() {
    const patientId = document.getElementById('filterPatient').value;
    if (!patientId) return;
    const r = await fetch(`/api/v1/ehr/documents/patient/${patientId}`);
    if (!r.ok) { alert('Error loading documents'); return; }
    const data = await r.json();
    const tbody = document.getElementById('docsTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">No documents found</td></tr>'; return; }
    const typeColors = { lab_report: 'bg-blue-100 text-blue-800', imaging_report: 'bg-purple-100 text-purple-800', consultation: 'bg-green-100 text-green-800', discharge_summary: 'bg-orange-100 text-orange-800', consent_form: 'bg-gray-100 text-gray-800', other: 'bg-gray-100 text-gray-800' };
    tbody.innerHTML = data.map(d => `
        <tr class="hover:bg-gray-50">
            <td class="px-4 py-2 text-sm">${new Date(d.created_at).toLocaleDateString()}</td>
            <td class="px-4 py-2 text-sm font-medium">${d.title}</td>
            <td class="px-4 py-2 text-sm"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${typeColors[d.document_type] || ''}">${d.document_type}</span></td>
            <td class="px-4 py-2 text-sm text-gray-500">${d.category ?? '—'}</td>
            <td class="px-4 py-2 text-sm text-gray-500">${d.file_size ? (d.file_size / 1024).toFixed(1) + ' KB' : '—'}</td>
            <td class="px-4 py-2 text-sm">
                <button class="text-red-500 hover:underline text-xs" onclick="deleteDoc('${d.id}')">Delete</button>
            </td>
        </tr>
    `).join('');
}
async function deleteDoc(id) {
    if (!confirm('Delete this document?')) return;
    const r = await fetch(`/api/v1/ehr/documents/${id}`, { method: 'DELETE' });
    if (r.ok) loadDocs();
}
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const r = await fetch('/api/v1/ehr/documents', { method: 'POST', body: fd });
    if (r.ok) { document.getElementById('uploadModal').classList.add('hidden'); e.target.reset(); loadDocs(); }
    else { const err = await r.json(); alert(err.detail || 'Error uploading'); }
});
</script>
</body>
</html>
