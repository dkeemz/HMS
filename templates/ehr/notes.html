<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Notes — HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-gray-50">
<div class="flex h-full">
    {% include "components/sidebar.html" %}
    <main class="flex-1 overflow-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Clinical Notes (SOAP)</h1>
                    <p class="text-gray-500 mt-1">Create and manage SOAP clinical notes for patient encounters</p>
                </div>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + New Note
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-4"><div class="text-sm text-gray-500">Total Notes</div><div class="text-2xl font-bold" id="stat-total">—</div></div>
                <div class="bg-white rounded-lg shadow p-4"><div class="text-sm text-gray-500">Draft</div><div class="text-2xl font-bold text-yellow-600" id="stat-draft">—</div></div>
                <div class="bg-white rounded-lg shadow p-4"><div class="text-sm text-gray-500">Signed</div><div class="text-2xl font-bold text-green-600" id="stat-signed">—</div></div>
                <div class="bg-white rounded-lg shadow p-4"><div class="text-sm text-gray-500">This Week</div><div class="text-2xl font-bold text-blue-600" id="stat-week">—</div></div>
            </div>

            <!-- Filter -->
            <div class="bg-white rounded-lg shadow mb-6 p-4">
                <div class="flex gap-4 items-center">
                    <input type="text" id="filterVisit" placeholder="Visit ID..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <select id="filterType" class="border rounded-lg px-3 py-2 text-sm">
                        <option value="">All Types</option>
                        <option value="consultation">Consultation</option>
                        <option value="follow_up">Follow-up</option>
                        <option value="procedure">Procedure</option>
                        <option value="discharge">Discharge</option>
                    </select>
                    <select id="filterStatus" class="border rounded-lg px-3 py-2 text-sm">
                        <option value="">All Status</option>
                        <option value="draft">Draft</option>
                        <option value="signed">Signed</option>
                        <option value="amended">Amended</option>
                    </select>
                    <button class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">Search</button>
                </div>
            </div>

            <!-- Notes Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Visit</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Doctor</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="notesTable">
                        <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Load a visit to view notes</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Create Modal -->
<div id="createModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6">
        <h2 class="text-lg font-bold mb-4">New SOAP Note</h2>
        <form id="noteForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Visit ID</label>
                    <input type="text" name="visit_id" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Patient ID</label>
                    <input type="text" name="patient_id" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Note Type</label>
                    <select name="note_type" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="consultation">Consultation</option>
                        <option value="follow_up">Follow-up</option>
                        <option value="procedure">Procedure</option>
                        <option value="discharge">Discharge</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Doctor ID</label>
                    <input type="text" name="doctor_id" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Optional">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Subjective</label>
                <textarea name="subjective" rows="3" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Patient's complaints, symptoms, history..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Objective</label>
                <textarea name="objective" rows="3" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Physical exam findings, vitals, lab results..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Assessment</label>
                <textarea name="assessment" rows="3" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Diagnosis, clinical impression..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Plan</label>
                <textarea name="plan" rows="3" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="Treatment plan, medications, follow-up..."></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button" onclick="document.getElementById('createModal').classList.add('hidden')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Save Note</button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('noteForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = {
        visit_id: fd.get('visit_id'),
        patient_id: fd.get('patient_id'),
        doctor_id: fd.get('doctor_id') || null,
        note_type: fd.get('note_type'),
        subjective: fd.get('subjective') || '',
        objective: fd.get('objective') || '',
        assessment: fd.get('assessment') || '',
        plan: fd.get('plan') || '',
    };
    const r = await fetch('/api/v1/ehr/notes', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    if (r.ok) { document.getElementById('createModal').classList.add('hidden'); e.target.reset(); alert('Note created!'); }
    else { const err = await r.json(); alert(err.detail || 'Error creating note'); }
});
</script>
</body>
</html>
