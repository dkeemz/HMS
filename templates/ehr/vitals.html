<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Signs — HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-gray-50">
<div class="flex h-full">
    {% include "components/sidebar.html" %}
    <main class="flex-1 overflow-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Vital Signs</h1>
                    <p class="text-gray-500 mt-1">Record and review patient vital signs</p>
                </div>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + Record Vitals
                </button>
            </div>

            <!-- Patient Filter -->
            <div class="bg-white rounded-lg shadow mb-6 p-4">
                <div class="flex gap-4 items-center">
                    <input type="text" id="filterPatient" placeholder="Patient ID..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <input type="text" id="filterVisit" placeholder="Visit ID (optional)..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <button onclick="loadVitals()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">Search</button>
                </div>
            </div>

            <!-- Vitals Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">BP (mmHg)</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">HR</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">RR</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Temp °C</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">SpO2</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Weight</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Height</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pain</th>
                            <th class="px-3 py-3 text-left text-xs font-medium text-gray-500 uppercase">Recorder</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="vitalsTable">
                        <tr><td colspan="10" class="px-4 py-8 text-center text-gray-400">Enter a patient ID to view vital signs</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Create Modal -->
<div id="createModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6">
        <h2 class="text-lg font-bold mb-4">Record Vital Signs</h2>
        <form id="vitalsForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Patient ID</label>
                    <input type="text" name="patient_id" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Visit ID (optional)</label>
                    <input type="text" name="visit_id" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Systolic BP</label>
                    <input type="number" name="systolic_bp" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="120">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Diastolic BP</label>
                    <input type="number" name="diastolic_bp" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="80">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Heart Rate</label>
                    <input type="number" name="heart_rate" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="72">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Resp Rate</label>
                    <input type="number" name="respiratory_rate" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="16">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Temperature °C</label>
                    <input type="number" step="0.1" name="temperature" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="36.5">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">SpO2 %</label>
                    <input type="number" name="oxygen_saturation" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="98">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Weight (kg)</label>
                    <input type="number" step="0.1" name="weight_kg" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Height (cm)</label>
                    <input type="number" step="0.1" name="height_cm" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Pain (0-10)</label>
                    <input type="number" min="0" max="10" name="pain_level" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button" onclick="document.getElementById('createModal').classList.add('hidden')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadVitals() {
    const patientId = document.getElementById('filterPatient').value;
    const visitId = document.getElementById('filterVisit').value;
    if (!patientId) return;
    let url = `/api/v1/ehr/vitals/patient/${patientId}`;
    const r = await fetch(url);
    if (!r.ok) { alert('Error loading vitals'); return; }
    const data = await r.json();
    const tbody = document.getElementById('vitalsTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="10" class="px-4 py-8 text-center text-gray-400">No vital signs found</td></tr>'; return; }
    tbody.innerHTML = data.map(v => `
        <tr class="hover:bg-gray-50">
            <td class="px-3 py-2 text-sm">${new Date(v.recorded_at).toLocaleDateString()}</td>
            <td class="px-3 py-2 text-sm">${v.systolic_bp ?? '—'}/${v.diastolic_bp ?? '—'}</td>
            <td class="px-3 py-2 text-sm">${v.heart_rate ?? '—'}</td>
            <td class="px-3 py-2 text-sm">${v.respiratory_rate ?? '—'}</td>
            <td class="px-3 py-2 text-sm">${v.temperature ?? '—'}</td>
            <td class="px-3 py-2 text-sm">${v.oxygen_saturation ?? '—'}%</td>
            <td class="px-3 py-2 text-sm">${v.weight_kg ?? '—'}</td>
            <td class="px-3 py-2 text-sm">${v.height_cm ?? '—'}</td>
            <td class="px-3 py-2 text-sm">${v.pain_level ?? '—'}/10</td>
            <td class="px-3 py-2 text-sm">${v.recorder_id?.slice(0,8) ?? '—'}</td>
        </tr>
    `).join('');
}

document.getElementById('vitalsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { patient_id: fd.get('patient_id') };
    if (fd.get('visit_id')) data.visit_id = fd.get('visit_id');
    ['systolic_bp','diastolic_bp','heart_rate','respiratory_rate','oxygen_saturation','pain_level'].forEach(k => {
        if (fd.get(k)) data[k] = parseInt(fd.get(k));
    });
    ['temperature','weight_kg','height_cm'].forEach(k => {
        if (fd.get(k)) data[k] = parseFloat(fd.get(k));
    });
    const r = await fetch('/api/v1/ehr/vitals', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    if (r.ok) { document.getElementById('createModal').classList.add('hidden'); e.target.reset(); alert('Vitals recorded!'); loadVitals(); }
    else { const err = await r.json(); alert(err.detail || 'Error recording vitals'); }
});
</script>
</body>
</html>
