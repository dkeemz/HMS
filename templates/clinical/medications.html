<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medication List — HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-gray-50">
<div class="flex h-full">
    {% include "components/sidebar.html" %}
    <main class="flex-1 overflow-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Current Medication List</h1>
                    <p class="text-gray-500 mt-1">Active and historical medications per patient</p>
                </div>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + Add Medication
                </button>
            </div>

            <div class="bg-white rounded-lg shadow mb-6 p-4">
                <div class="flex gap-4 items-center">
                    <input type="text" id="filterPatient" placeholder="Patient ID..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <button onclick="loadMeds()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">Search</button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Medication</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Strength</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Frequency</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Route</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="medsTable">
                        <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Enter a patient ID to view medications</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="createModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
        <h2 class="text-lg font-bold mb-4">Add Medication</h2>
        <form id="medForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Patient ID</label>
                <input type="text" name="patient_id" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Medication Name</label>
                    <input type="text" name="medication_name" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Generic Name</label>
                    <input type="text" name="generic_name" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Strength</label>
                    <input type="text" name="strength" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. 500mg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Dosage Form</label>
                    <select name="dosage_form" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="">—</option>
                        <option value="tablet">Tablet</option>
                        <option value="capsule">Capsule</option>
                        <option value="syrup">Syrup</option>
                        <option value="injection">Injection</option>
                        <option value="cream">Cream</option>
                        <option value="drops">Drops</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Route</label>
                    <select name="route" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="">—</option>
                        <option value="oral">Oral</option>
                        <option value="iv">IV</option>
                        <option value="im">IM</option>
                        <option value="sc">SC</option>
                        <option value="topical">Topical</option>
                        <option value="inhaled">Inhaled</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Frequency</label>
                    <input type="text" name="frequency" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. BID">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Duration</label>
                    <input type="text" name="duration" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. 7 days">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Quantity</label>
                    <input type="number" name="quantity" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Refills</label>
                    <input type="number" name="refills" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Start Date</label>
                    <input type="date" name="start_date" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">End Date</label>
                    <input type="date" name="end_date" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Notes</label>
                <textarea name="notes" rows="2" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm"></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button" onclick="document.getElementById('createModal').classList.add('hidden')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadMeds() {
    const pid = document.getElementById('filterPatient').value;
    if (!pid) return;
    const r = await fetch(`/api/v1/ehr/medications/patient/${pid}?active_only=true`);
    if (!r.ok) { alert('Error'); return; }
    const data = await r.json();
    const tbody = document.getElementById('medsTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">No medications found</td></tr>'; return; }
    tbody.innerHTML = data.map(m => `
        <tr class="hover:bg-gray-50">
            <td class="px-4 py-2 text-sm font-medium">${m.medication_name}${m.generic_name ? ` (${m.generic_name})` : ''}</td>
            <td class="px-4 py-2 text-sm">${m.strength || '—'}</td>
            <td class="px-4 py-2 text-sm">${m.frequency || '—'}</td>
            <td class="px-4 py-2 text-sm">${m.route || '—'}</td>
            <td class="px-4 py-2 text-sm"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${m.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">${m.status}</span></td>
            <td class="px-4 py-2 text-sm">
                <button class="text-red-500 hover:underline text-xs" onclick="deleteMed('${m.id}')">Delete</button>
            </td>
        </tr>
    `).join('');
}
async function deleteMed(id) {
    if (!confirm('Delete this medication?')) return;
    const r = await fetch(`/api/v1/ehr/medications/${id}`, { method: 'DELETE' });
    if (r.ok) loadMeds();
}
document.getElementById('medForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { patient_id: fd.get('patient_id'), medication_name: fd.get('medication_name') };
    if (fd.get('generic_name')) data.generic_name = fd.get('generic_name');
    if (fd.get('strength')) data.strength = fd.get('strength');
    if (fd.get('dosage_form')) data.dosage_form = fd.get('dosage_form');
    if (fd.get('frequency')) data.frequency = fd.get('frequency');
    if (fd.get('route')) data.route = fd.get('route');
    if (fd.get('duration')) data.duration = fd.get('duration');
    if (fd.get('quantity')) data.quantity = parseInt(fd.get('quantity'));
    if (fd.get('refills')) data.refills = parseInt(fd.get('refills'));
    if (fd.get('start_date')) data.start_date = fd.get('start_date');
    if (fd.get('end_date')) data.end_date = fd.get('end_date');
    if (fd.get('notes')) data.notes = fd.get('notes');
    const r = await fetch('/api/v1/ehr/medications', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    if (r.ok) { document.getElementById('createModal').classList.add('hidden'); e.target.reset(); loadMeds(); }
    else { const err = await r.json(); alert(err.detail || 'Error'); }
});
</script>
</body>
</html>
