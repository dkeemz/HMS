<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Problems — HMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="h-full bg-gray-50">
<div class="flex h-full">
    {% include "components/sidebar.html" %}
    <main class="flex-1 overflow-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Active Problem List</h1>
                    <p class="text-gray-500 mt-1">Per-patient active problem list with add/resolve/close tracking</p>
                </div>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    + Add Problem
                </button>
            </div>

            <div class="bg-white rounded-lg shadow mb-6 p-4">
                <div class="flex gap-4 items-center">
                    <input type="text" id="filterPatient" placeholder="Patient ID..." class="border rounded-lg px-3 py-2 text-sm flex-1">
                    <button onclick="loadProblems()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">Search</button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Problem</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ICD Code</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Onset</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Resolved</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="problemsTable">
                        <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">Enter a patient ID to view problems</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="createModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
        <h2 class="text-lg font-bold mb-4">Add Problem</h2>
        <form id="problemForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Patient ID</label>
                <input type="text" name="patient_id" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Problem Name</label>
                <input type="text" name="problem_name" required class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ICD Code</label>
                    <input type="text" name="icd_code" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. I10">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Chronicity</label>
                    <select name="chronicity" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="">—</option>
                        <option value="acute">Acute</option>
                        <option value="chronic">Chronic</option>
                        <option value="recurrent">Recurrent</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Onset Date</label>
                    <input type="date" name="onset_date" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Laterality</label>
                    <select name="laterality" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm">
                        <option value="">—</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                        <option value="bilateral">Bilateral</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Notes</label>
                <textarea name="notes" rows="2" class="mt-1 block w-full border rounded-lg px-3 py-2 text-sm"></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button" onclick="document.getElementById('createModal').classList.add('hidden')" class="px-4 py-2 border rounded-lg text-sm hover:bg-gray-50">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Save</button>
            </div>
        </form>
    </div>
</div>

<script>
async function loadProblems() {
    const pid = document.getElementById('filterPatient').value;
    if (!pid) return;
    const r = await fetch(`/api/v1/ehr/problems/patient/${pid}?active_only=true`);
    if (!r.ok) { alert('Error'); return; }
    const data = await r.json();
    const tbody = document.getElementById('problemsTable');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">No active problems</td></tr>'; return; }
    tbody.innerHTML = data.map(p => `
        <tr class="hover:bg-gray-50">
            <td class="px-4 py-2 text-sm font-medium">${p.problem_name}</td>
            <td class="px-4 py-2 text-sm font-mono">${p.icd_code || '—'}</td>
            <td class="px-4 py-2 text-sm"><span class="px-2 py-0.5 rounded-full text-xs font-medium ${p.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">${p.status}</span></td>
            <td class="px-4 py-2 text-sm">${p.onset_date || '—'}</td>
            <td class="px-4 py-2 text-sm">${p.resolved_date || '—'}</td>
            <td class="px-4 py-2 text-sm">
                ${p.status === 'active' ? `<button class="text-green-500 hover:underline text-xs mr-2" onclick="resolveProblem('${p.id}')">Resolve</button>` : ''}
                <button class="text-red-500 hover:underline text-xs" onclick="deleteProblem('${p.id}')">Delete</button>
            </td>
        </tr>
    `).join('');
}
async function resolveProblem(id) {
    if (!confirm('Resolve this problem?')) return;
    const r = await fetch(`/api/v1/ehr/problems/${id}/resolve`, { method: 'POST' });
    if (r.ok) loadProblems();
}
async function deleteProblem(id) {
    if (!confirm('Delete this problem?')) return;
    const r = await fetch(`/api/v1/ehr/problems/${id}`, { method: 'DELETE' });
    if (r.ok) loadProblems();
}
document.getElementById('problemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = { patient_id: fd.get('patient_id'), problem_name: fd.get('problem_name') };
    if (fd.get('icd_code')) data.icd_code = fd.get('icd_code');
    if (fd.get('chronicity')) data.chronicity = fd.get('chronicity');
    if (fd.get('onset_date')) data.onset_date = fd.get('onset_date');
    if (fd.get('laterality')) data.laterality = fd.get('laterality');
    if (fd.get('notes')) data.notes = fd.get('notes');
    const r = await fetch('/api/v1/ehr/problems', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
    if (r.ok) { document.getElementById('createModal').classList.add('hidden'); e.target.reset(); loadProblems(); }
    else { const err = await r.json(); alert(err.detail || 'Error'); }
});
</script>
</body>
</html>
