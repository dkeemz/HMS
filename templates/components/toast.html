{# ═══════════════════════════════════════════════════════════════════════════
   Toast notification component
   Usage: {% include "components/toast.html" %}
   ═══════════════════════════════════════════════════════════════════════════ #}

<div id="toast-container"
     class="toast-container fixed top-4 right-4 z-50 flex flex-col gap-3 max-w-sm pointer-events-none no-print"
     aria-live="polite"
     aria-atomic="false"
     role="status">
</div>

<template id="toast-template-success">
  <div class="pointer-events-auto flex items-start gap-3 rounded-lg border p-4 shadow-lg bg-green-50 border-green-200 dark:bg-green-900/30 dark:border-green-800"
       role="alert" aria-atomic="true">
    <svg class="w-5 h-5 text-green-600 dark:text-green-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <div class="flex-1">
      <p class="text-sm font-medium text-green-800 dark:text-green-200 toast-title"></p>
      <p class="text-sm text-green-700 dark:text-green-300 mt-0.5 toast-message"></p>
    </div>
    <button class="text-green-500 hover:text-green-700 dark:text-green-400 dark:hover:text-green-200 shrink-0"
            onclick="HMS.Toast.dismiss(this.closest('.toast-item'))" aria-label="Dismiss notification">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
</template>

<template id="toast-template-error">
  <div class="pointer-events-auto flex items-start gap-3 rounded-lg border p-4 shadow-lg bg-red-50 border-red-200 dark:bg-red-900/30 dark:border-red-800"
       role="alert" aria-atomic="true">
    <svg class="w-5 h-5 text-red-600 dark:text-red-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <div class="flex-1">
      <p class="text-sm font-medium text-red-800 dark:text-red-200 toast-title"></p>
      <p class="text-sm text-red-700 dark:text-red-300 mt-0.5 toast-message"></p>
    </div>
    <button class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-200 shrink-0"
            onclick="HMS.Toast.dismiss(this.closest('.toast-item'))" aria-label="Dismiss notification">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
</template>

<template id="toast-template-warning">
  <div class="pointer-events-auto flex items-start gap-3 rounded-lg border p-4 shadow-lg bg-amber-50 border-amber-200 dark:bg-amber-900/30 dark:border-amber-800"
       role="alert" aria-atomic="true">
    <svg class="w-5 h-5 text-amber-600 dark:text-amber-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.072 16.5c-.77.833.192 2.5 1.732 2.5z"/>
    </svg>
    <div class="flex-1">
      <p class="text-sm font-medium text-amber-800 dark:text-amber-200 toast-title"></p>
      <p class="text-sm text-amber-700 dark:text-amber-300 mt-0.5 toast-message"></p>
    </div>
    <button class="text-amber-500 hover:text-amber-700 dark:text-amber-400 dark:hover:text-amber-200 shrink-0"
            onclick="HMS.Toast.dismiss(this.closest('.toast-item'))" aria-label="Dismiss notification">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
</template>

<template id="toast-template-info">
  <div class="pointer-events-auto flex items-start gap-3 rounded-lg border p-4 shadow-lg bg-blue-50 border-blue-200 dark:bg-blue-900/30 dark:border-blue-800"
       role="alert" aria-atomic="true">
    <svg class="w-5 h-5 text-blue-600 dark:text-blue-400 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <div class="flex-1">
      <p class="text-sm font-medium text-blue-800 dark:text-blue-200 toast-title"></p>
      <p class="text-sm text-blue-700 dark:text-blue-300 mt-0.5 toast-message"></p>
    </div>
    <button class="text-blue-500 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-200 shrink-0"
            onclick="HMS.Toast.dismiss(this.closest('.toast-item'))" aria-label="Dismiss notification">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
</template>
