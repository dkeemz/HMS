<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HMS{% endblock %}</title>
    <meta name="description" content="Health Management System — Secure clinical platform">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
      // Prevent FOUC: apply theme before paint
      (function(){
        var t = localStorage.getItem('hms-theme');
        if(t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme:dark)').matches)){
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
</head>
<body class="bg-hms-bg text-hms-text min-h-screen transition-colors duration-200">

    {# Skip link for keyboard users #}
    <a href="#main-content" class="skip-link">Skip to main content</a>

    {% block body %}{% endblock %}

    {# Toast container (always present) #}
    {% include "components/toast.html" %}

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
